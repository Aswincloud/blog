{{ define "main" }}
<section class="intro">
  <h1>{{ .Site.Title }}</h1>
  <p class="tagline">{{ .Site.Params.description }}</p>
</section>
<section class="post-list">
{{ range where .Site.RegularPages "Type" "posts" }}
  <article class="post-item">
    <a href="{{ .RelPermalink }}"><h2>{{ .Title }}</h2></a>
    <p class="meta">{{ .Date.Format "Jan 2, 2006" }} · {{ .ReadingTime }} min read</p>
    <p>{{ .Description }}</p>
  </article>
{{ end }}
</section>
{{ end }}
