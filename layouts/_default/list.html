{{ define "main" }}
{{- $posts := .RegularPages -}}
<div class="page">
  <div class="section-label" style="margin-bottom: var(--space-l)">
    <h2>{{ .Title }}</h2>
    <span class="rule" aria-hidden="true"></span>
    <span class="count">{{ len $posts }}</span>
  </div>
  {{- with .Content }}<div class="prose" style="margin-bottom: var(--space-l)">{{ . }}</div>{{ end -}}
</div>

<div class="post-list">
  {{- range $posts -}}
    {{ partial "post-card.html" . }}
  {{- else -}}
    <p style="color: var(--muted)">No posts yet.</p>
  {{- end -}}
</div>
{{ end }}
